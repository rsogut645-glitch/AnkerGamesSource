name: Update AnkerGames Source

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  scrape-and-update:
    # FIX: Pins the OS to Ubuntu 22.04.
    # This matches the dependencies required by Playwright and fixes the installation error.
    runs-on: ubuntu-22.04
    
    permissions:
      contents: write # Required to push the JSON file back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up future runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          playwright install chromium
          # This command installs the specific OS-level libraries needed (fixes the missing libffi errors)
          playwright install-deps

      - name: Run Scraper
        run: python ankergames_scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add ankergames.json
          # Only commit if the file actually changed to avoid errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update AnkerGames source" && git push)
